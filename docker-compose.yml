services:
  mysql:
    image: mysql:8.4
    container_name: koi-prode-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: koi_prode
    ports:
      - "3307:3306"
    volumes:
      - koi-prode-mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  koi-prode-mysql-data:
